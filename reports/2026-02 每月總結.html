<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026-02 每月總結 | 守護者進化</title>
    <!-- Frameworks -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* Palette: Tech Dark Professional hardware glow */
            --bg-dark: #0A0A0B;
            --card-dark: #161618;
            --accent: #FFD700;
            /* Hardware Gold Glow */
            --primary: #3B82F6;
            /* Tech Blue */
            --secondary: #6366F1;
            --text-main: #E2E8F0;
            --text-dim: #94A3B8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-card {
            background: rgba(22, 22, 24, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .hardware-glow {
            position: relative;
        }

        .hardware-glow::after {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--accent), transparent);
            z-index: -1;
            border-radius: inherit;
            opacity: 0.15;
        }

        .text-gradient-gold {
            background: linear-gradient(135deg, #FFF 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .energy-node {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;
        const { useState, useEffect } = React;

        const Icon = ({ name, color = "currentColor", size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, color }}></i>;
        };

        const SectionHeader = ({ title, subtitle }) => (
            <div className="flex items-center gap-8 mb-16">
                <h2 className="text-4xl font-black text-white shrink-0">{title}</h2>
                <div className="h-[1px] w-full bg-white/5 relative">
                    <div className="absolute left-0 top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-accent/20"></div>
                </div>
            </div>
        );

        const App = () => {
            const container = {
                hidden: { opacity: 0 },
                show: { opacity: 1, transition: { staggerChildren: 0.15 } }
            };

            const item = {
                hidden: { opacity: 0, y: 30 },
                show: { opacity: 1, y: 0, transition: { type: "spring", stiffness: 100 } }
            };

            return (
                <motion.div
                    variants={container}
                    initial="hidden"
                    animate="show"
                    className="min-h-screen py-24 px-6 md:px-32 max-w-7xl mx-auto space-y-40"
                >
                    {/* 1. HERO */}
                    <motion.section variants={item} className="relative text-center space-y-12">
                        <div className="absolute -top-24 left-1/2 -translate-x-1/2 w-96 h-96 bg-primary/20 rounded-full blur-[120px] -z-10"></div>
                        <div className="inline-flex items-center gap-3 px-6 py-2 rounded-full border border-white/10 glass-card mono text-[10px] font-bold tracking-[0.4em] uppercase text-accent">
                            <span className="energy-node"></span>
                            System Update 2026.02_Completed
                        </div>
                        <h1 className="text-6xl md:text-9xl font-black tracking-tighter leading-none">
                            守護者進化<br />
                            <span className="text-gradient-gold">HARDWARE EVO</span>
                        </h1>
                        <p className="text-text-dim text-xl md:text-2xl font-light max-w-3xl mx-auto leading-relaxed">
                            Ultra 3 與 500MB 網路只是裝備，<br />
                            穩定小夕與守護家庭才是核心驅動力。
                        </p>
                    </motion.section>

                    {/* 2. DASHBOARD */}
                    <div className="space-y-0">
                        <SectionHeader title="執行數據總覽" />
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <motion.div variants={item} className="glass-card hardware-glow p-12 rounded-[3.5rem] flex flex-col items-center justify-center space-y-8">
                                <h3 className="mono text-white/30 text-[10px] font-bold tracking-widest uppercase">System Load (Efficiency)</h3>
                                <div className="relative">
                                    <svg className="w-56 h-56 transform -rotate-90">
                                        <circle cx="112" cy="112" r="100" stroke="rgba(255,255,255,0.03)" strokeWidth="12" fill="none" />
                                        <motion.circle
                                            cx="112" cy="112" r="100" stroke="var(--primary)" strokeWidth="12" fill="none"
                                            strokeDasharray="628.3"
                                            initial={{ strokeDashoffset: 628.3 }}
                                            animate={{ strokeDashoffset: 628.3 * (1 - 0.827) }}
                                            transition={{ duration: 2.5, ease: "circOut" }}
                                        />
                                    </svg>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                        <span className="text-7xl font-black text-white mono tabular-nums">82.7</span>
                                        <span className="text-primary font-bold mono text-xs uppercase pt-2">Efficiency Rating</span>
                                    </div>
                                </div>
                            </motion.div>

                            <motion.div variants={item} className="glass-card hardware-glow p-12 rounded-[3.5rem] lg:col-span-2 space-y-12">
                                <div className="flex justify-between items-center border-b border-white/5 pb-6">
                                    <h3 className="mono text-white/30 text-[10px] font-bold tracking-widest uppercase">Strategic Goal Matrix</h3>
                                    <Icon name="cpu" size={16} className="text-accent/40" />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
                                    {[
                                        { t: "培養運動習慣", d: "飛輪/慢跑：重啟節奏，成功存活。", s: "ACTIVE" },
                                        { t: "落實十二週計畫", d: "環境/目標/助理：助理架構定案。", s: "STABLE" },
                                        { t: "培養專業技能", d: "React/SDD/後端：深度筆記與啟動培訓。", s: "ACCEL" },
                                        { t: "培養閱讀習慣", d: "不限時模式：穩定 100% 達成率。", s: "STABLE" }
                                    ].map((g, i) => (
                                        <div key={i} className="space-y-3 group">
                                            <div className="flex items-center gap-3">
                                                <div className="w-2 h-2 rounded-full bg-accent group-hover:scale-150 transition-transform"></div>
                                                <h4 className="text-xl font-bold text-white tracking-tight">{g.t}</h4>
                                                <span className="mono text-[8px] bg-white/5 text-white/40 px-2 py-0.5 rounded uppercase">{g.s}</span>
                                            </div>
                                            <p className="text-text-dim text-sm leading-relaxed font-light">{g.d}</p>
                                        </div>
                                    ))}
                                </div>
                            </motion.div>
                        </div>
                    </div>

                    {/* 3. TREND */}
                    <div className="space-y-0">
                        <SectionHeader title="習慣穩定度分析" />
                        <motion.section variants={item} className="glass-card hardware-glow p-16 rounded-[4.5rem] space-y-16 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-accent/5 blur-[100px] -z-10"></div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="border-b border-white/5 text-white/20 mono text-[9px] uppercase font-black">
                                            <th className="pb-10 pl-6">Core Module</th>
                                            {['W06', 'W07', 'W08', 'W09'].map(w => <th key={w} className="pb-10 text-center">{w}</th>)}
                                            <th className="pb-10 pr-6 text-right">Momentum</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {[
                                            { n: "核心飲水 3000ml", s: ["7/7", "6/6*", "7/7", "7/7"], m: "HIGH" },
                                            { n: "減少糖分攝取", s: ["7/7", "6/6*", "7/7", "7/7"], m: "HIGH" },
                                            { n: "練習英打習慣", s: ["7/7", "6/6*", "7/7", "7/7"], m: "HIGH" },
                                            { n: "閱讀不限時模式", s: ["6/7", "6/6*", "7/7", "7/7"], m: "OPTIMIZED" },
                                            { n: "完成每日小結", s: ["7/7", "6/6*", "7/7", "7/7"], m: "HIGH" }
                                        ].map((h, i) => (
                                            <tr key={i} className="group hover:bg-white/[0.02] transition-colors">
                                                <td className="py-10 pl-6 text-lg font-bold text-white/90">{h.n}</td>
                                                {h.s.map((val, idx) => (
                                                    <td key={idx} className="py-10 text-center">
                                                        <span className={`px-4 py-1.5 rounded-lg mono text-[10px] font-black ${val.includes('7/7') ? 'text-accent border border-accent/20 bg-accent/5' : 'text-primary border border-primary/20 bg-primary/5'}`}>
                                                            {val}
                                                        </span>
                                                    </td>
                                                ))}
                                                <td className="py-10 pr-6 text-right text-accent/40 mono text-[10px]">{h.m}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </motion.section>
                    </div>

                    {/* 4. NARRATIVE */}
                    <div className="space-y-0">
                        <SectionHeader title="深度全景回顧" />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                            {[
                                { t: "專業進化：技術確認者", d: "完成 React Hook 體體梳理。領悟開發者核心價值在於「規避模糊需求」與「確認邏輯」。", i: "layers" },
                                { t: "家庭守護：壓力穩態", d: "應對 2/21 凌晨急診事件。完成財務藍圖定案與物資整備，穩住安胎期間的家庭重心。", i: "shield" },
                                { t: "環境升級：生產力硬體", d: "佈署 Ultra 3 與社區網路 500MB。將科技裝備轉化為自律系統的支撐零件。", i: "smartphone" },
                                { t: "個人管理：自律落地", d: "正式定稿 AI 助理架構 (Antigravity)。學會在變動中精準錨定生活規律。", i: "zap" }
                            ].map((c, i) => (
                                <motion.div
                                    key={i}
                                    whileInView={{ opacity: 1, x: 0 }}
                                    initial={{ opacity: 0, x: -30 }}
                                    viewport={{ once: true }}
                                    className="glass-card hardware-glow p-12 rounded-[4rem] group"
                                >
                                    <div className="flex gap-8">
                                        <div className="w-16 h-16 rounded-3xl bg-white/5 flex items-center justify-center text-accent group-hover:scale-110 transition-transform">
                                            <Icon name={c.i} size={32} />
                                        </div>
                                        <div className="flex-1 space-y-4">
                                            <h4 className="text-2xl font-black text-white tracking-tight">{c.t}</h4>
                                            <p className="text-text-dim text-lg leading-relaxed font-light">{c.d}</p>
                                        </div>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>

                    {/* 5. WISDOM */}
                    <div className="space-y-0">
                        <SectionHeader title="核心金句紀錄" />
                        <motion.section
                            whileInView={{ opacity: 1, y: 0 }}
                            initial={{ opacity: 0, y: 50 }}
                            className="glass-card hardware-glow p-24 rounded-[5rem] text-center space-y-16 relative overflow-hidden"
                        >
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-accent/30 to-transparent"></div>
                            <div className="space-y-6">
                                <Icon name="quote" size={40} className="mx-auto text-accent/20" />
                                <p className="text-3xl md:text-5xl font-black text-white leading-tight tracking-tight px-4 italic">
                                    「能在面臨誘惑時選擇立即停下來，專注於下一件該做的事情，是對自己生活節奏的掌握。」
                                </p>
                            </div>
                            <div className="pt-8">
                                <p className="text-text-dim/60 font-medium text-xl leading-relaxed max-w-2xl mx-auto">
                                    「人生雖然像一場賭局，你可以勇敢下注，但不需要一次 all in。」
                                </p>
                            </div>
                        </motion.section>
                    </div>

                    {/* 6. GAINS */}
                    <div className="space-y-0">
                        <SectionHeader title="月度三大獲益" />
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {[
                                { l: "家庭穩定", t: "System Integrity", d: "財務規劃與安胎應變。", i: "lock" },
                                { l: "技術質變", t: "Architecture Update", d: "React Hook 梳理與 AI 助理。", i: "code-2" },
                                { l: "自律體力", t: "Operation Success", d: "12 週計畫落地與飛輪重啟。", i: "activity" }
                            ].map((g, i) => (
                                <motion.div
                                    key={i}
                                    whileHover={{ scale: 1.05 }}
                                    className="glass-card p-12 rounded-[4.5rem] space-y-8 flex flex-col items-center text-center border-t-2 border-accent/10"
                                >
                                    <div className="p-6 rounded-full bg-accent/5 text-accent shadow-[0_0_30px_rgba(255,215,0,0.1)]">
                                        <Icon name={g.i} size={32} />
                                    </div>
                                    <div className="space-y-2">
                                        <h4 className="text-2xl font-black text-white">{g.l}</h4>
                                        <p className="mono text-[10px] text-accent font-bold tracking-[0.4em] uppercase">{g.t}</p>
                                        <p className="pt-4 text-text-dim/60 text-sm font-medium">{g.d}</p>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="pt-32 pb-16 text-center space-y-10 border-t border-white/5">
                        <div className="flex justify-center gap-10">
                            {[1, 2, 3].map(v => <div key={v} className="w-1.5 h-1.5 rounded-full bg-accent/20"></div>)}
                        </div>
                        <div className="space-y-3">
                            <p className="mono text-[10px] text-white/20 uppercase tracking-[1em] font-black">
                                Guardian Protocol_v2.0 // DEEP ARCHIVE feb_2026
                            </p>
                            <p className="text-[9px] text-white/10 mono uppercase tracking-[0.2em]">Designed by Antigravity // Hardware Accelerated Visuals</p>
                        </div>
                    </footer>
                </motion.div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
